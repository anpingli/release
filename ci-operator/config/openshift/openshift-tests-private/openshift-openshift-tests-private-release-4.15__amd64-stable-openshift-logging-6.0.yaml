build_root:
  image_stream_tag:
    name: release
    namespace: openshift
    tag: golang-1.18
releases:
  latest:
    candidate:
      architecture: arm64
      product: ocp
      stream: nightly
      version: "4.15"
resources:
  '*':
    limits:
      memory: 8Gi
    requests:
      cpu: "1"
      memory: 1Gi
tests:
- as: azure-ipi-oidc-arm-f14
  cron: 14 4 * * 2
  steps:
    cluster_profile: azure-qe
    env:
      BASE_DOMAIN: qe.azure.devcluster.openshift.com
      CLO_SUB_CHANNEL: stable-6.0
      CLO_TARGET_NAMESPACES: ""
      COMPUTE_NODE_TYPE: Standard_D4ps_v5
      FORCE_SUCCESS_EXIT: "true"
      LO_SUB_CHANNEL: stable-6.0
      LOGGING_INDEX_IMAGE: quay.io/openshift-qe-optional-operators/aosqe-index:log6.0
      TEST_FILTERS: Disruptive;Longduration
      TEST_PARALLEL: "3"
      TEST_SCENARIOS: sig-openshift-logging
      TEST_TIMEOUT: "30"
    test:
    - ref: enable-qe-catalogsource-logging
    - ref: operatorhub-subscribe-cluster-logging-operator
    - ref: operatorhub-subscribe-loki-operator
    - ref: operatorhub-subscribe-elasticsearch-operator
    - chain: openshift-e2e-test-logging-qe-disruptive
    workflow: cucushift-installer-rehearse-azure-ipi-cco-manual-workload-identity
zz_generated_metadata:
  branch: release-4.15
  org: openshift
  repo: openshift-tests-private
  variant: amd64-stable-openshift-logging-6.0
